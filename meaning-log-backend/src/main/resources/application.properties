spring.application.name=meaning-log-backend
spring.config.import=optional:file:./application-local.properties,optional:file:./application-docker.properties

server.port=8080

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:meaning_log}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway 负责建表与后续迁移，schema.sql 已废弃（迁至 db/migration/V1__init_schema.sql）
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# 已有数据库首次接入时避免报 "Found non-empty schema" 错误
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2s

# --- Actuator / Prometheus 观测端点 ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=false
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
# 本地/测试不需要 SMTP 探活占用 health（真实凭据未接入时会导致 health DOWN）
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}

# --- Knife4j / OpenAPI ---
# Knife4j UI 入口：/doc.html；原生 Swagger UI：/swagger-ui.html
# TODO(tech-debt): 禁用 Knife4jAutoConfiguration 是暂时妥协，非最终方案
#   - 妥协原因：Knife4j 4.5.0 内部的 Knife4jOpenApiCustomizer 调用 springdoc
#     2.3.0 的 SwaggerUiConfigParameters.getGroupConfigs()，该方法在 springdoc
#     2.7.0 已被移除，启动即抛 NoSuchMethodError。整体禁用 AutoConfiguration
#     可让服务起来，但同时也失去了 Knife4j 的国际化、增强分组、请求头透传、
#     离线文档等增强能力，当前仅保留 /doc.html 静态 UI 壳。
#   - 复审条件（满足任一即移除本行并回归 Knife4j 增强能力）：
#       a) Knife4j 发布 4.6+ 官方适配 springdoc 2.7.x
#       b) 退回一致版本组合（knife4j 4.4 + springdoc 2.3）
#       c) springdoc 恢复 getGroupConfigs 或 Knife4j 上游修复
spring.autoconfigure.exclude=com.github.xiaoymin.knife4j.spring.configuration.Knife4jAutoConfiguration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.chad.meaninglog.controller

# --- RabbitMQ 消费者与 AI 异步任务 MQ 配置 ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.concurrency=${AI_MQ_CONCURRENCY:5}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2s
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=15s
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# --- AI 任务 RUNNING 卡死回收 ---
ai.task.running-timeout-seconds=${AI_TASK_RUNNING_TIMEOUT_SECONDS:600}
ai.task.reaper.enabled=${AI_TASK_REAPER_ENABLED:true}
ai.task.reaper.fixed-delay-ms=${AI_TASK_REAPER_FIXED_DELAY_MS:60000}

# --- Resilience4j (deepseek 实例：AI 上游调用重试 + 熔断) ---
resilience4j.retry.instances.deepseek.max-attempts=3
resilience4j.retry.instances.deepseek.wait-duration=1s
resilience4j.retry.instances.deepseek.enable-exponential-backoff=true
resilience4j.retry.instances.deepseek.exponential-backoff-multiplier=2
resilience4j.retry.instances.deepseek.retry-exceptions=org.springframework.web.client.RestClientResponseException,org.springframework.web.client.ResourceAccessException,java.io.IOException

resilience4j.circuitbreaker.instances.deepseek.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.deepseek.sliding-window-size=10
resilience4j.circuitbreaker.instances.deepseek.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.deepseek.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.deepseek.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.deepseek.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.deepseek.record-exceptions=org.springframework.web.client.RestClientResponseException,org.springframework.web.client.ResourceAccessException,java.io.IOException

ai.rate-limit.max-requests=${AI_RATE_LIMIT_MAX_REQUESTS:5}
ai.rate-limit.window-seconds=${AI_RATE_LIMIT_WINDOW_SECONDS:60}
ai.trial-rate-limit.max-requests=${AI_TRIAL_RATE_LIMIT_MAX_REQUESTS:3}
ai.trial-rate-limit.window-seconds=${AI_TRIAL_RATE_LIMIT_WINDOW_SECONDS:300}
# Leave blank for direct local deployment: X-Forwarded-For is ignored unless the socket peer matches one of these CIDRs.
app.trusted-proxy-cidrs=${TRUSTED_PROXY_CIDRS:}
app.sse.executor.pool-size=${SSE_EXECUTOR_POOL_SIZE:8}
app.sse.executor.queue-capacity=${SSE_EXECUTOR_QUEUE_CAPACITY:32}
app.sse.executor.shutdown-await-seconds=${SSE_EXECUTOR_SHUTDOWN_AWAIT_SECONDS:30}
app.ai.api-key=${ai.api-key:${DEEPSEEK_API_KEY:}}
app.ai.base-url=${APP_AI_BASE_URL:https://api.deepseek.com/v1}
app.ai.model=${APP_AI_MODEL:deepseek-chat}

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

auth.trusted-proxy-cidrs=${AUTH_TRUSTED_PROXY_CIDRS:}
app.cors.additional-origins=${APP_CORS_ADDITIONAL_ORIGINS:}
auth.login.attempt-window-seconds=${AUTH_LOGIN_ATTEMPT_WINDOW_SECONDS:900}
auth.login.max-attempts-per-source=${AUTH_LOGIN_MAX_ATTEMPTS_PER_SOURCE:20}
auth.login.max-attempts-per-principal-source=${AUTH_LOGIN_MAX_ATTEMPTS_PER_PRINCIPAL_SOURCE:5}

spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:2465}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_READ_TIMEOUT_MS:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:10000}
mail.from=${MAIL_FROM:}

email.verification.code-ttl-seconds=${EMAIL_CODE_TTL:300}
email.verification.resend-cooldown-seconds=${EMAIL_CODE_COOLDOWN:60}
email.verification.max-attempts=${EMAIL_CODE_MAX_ATTEMPTS:5}
email.verification.max-total-attempts=${EMAIL_CODE_MAX_TOTAL_ATTEMPTS:20}
email.verification.send.max-attempts-per-source=${EMAIL_CODE_SEND_MAX_ATTEMPTS_PER_SOURCE:5}
email.verification.send.max-attempts-global=${EMAIL_CODE_SEND_MAX_ATTEMPTS_GLOBAL:100}
email.verification.send.window-seconds=${EMAIL_CODE_SEND_WINDOW_SECONDS:60}

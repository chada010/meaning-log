spring.application.name=meaning-log-backend
spring.config.import=optional:file:./application-local.properties,optional:file:./application-docker.properties

server.port=8080

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:meaning_log}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${DB_PASSWORD:your-db-password-here}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2s

ai.rate-limit.max-requests=${AI_RATE_LIMIT_MAX_REQUESTS:5}
ai.rate-limit.window-seconds=${AI_RATE_LIMIT_WINDOW_SECONDS:60}
ai.trial-rate-limit.max-requests=${AI_TRIAL_RATE_LIMIT_MAX_REQUESTS:3}
ai.trial-rate-limit.window-seconds=${AI_TRIAL_RATE_LIMIT_WINDOW_SECONDS:300}
# Leave blank for direct local deployment: X-Forwarded-For is ignored unless the socket peer matches one of these CIDRs.
app.trusted-proxy-cidrs=${TRUSTED_PROXY_CIDRS:}
app.sse.executor.pool-size=${SSE_EXECUTOR_POOL_SIZE:8}
app.sse.executor.queue-capacity=${SSE_EXECUTOR_QUEUE_CAPACITY:32}
app.sse.executor.shutdown-await-seconds=${SSE_EXECUTOR_SHUTDOWN_AWAIT_SECONDS:30}
app.ai.api-key=${ai.api-key:${DEEPSEEK_API_KEY:}}
app.ai.base-url=${APP_AI_BASE_URL:https://api.deepseek.com/v1}
app.ai.model=${APP_AI_MODEL:deepseek-chat}

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

auth.trusted-proxy-cidrs=${AUTH_TRUSTED_PROXY_CIDRS:}
auth.login.attempt-window-seconds=${AUTH_LOGIN_ATTEMPT_WINDOW_SECONDS:900}
auth.login.max-attempts-per-source=${AUTH_LOGIN_MAX_ATTEMPTS_PER_SOURCE:20}
auth.login.max-attempts-per-principal-source=${AUTH_LOGIN_MAX_ATTEMPTS_PER_PRINCIPAL_SOURCE:5}

spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:your-email@qq.com}
spring.mail.password=${MAIL_PASSWORD:your-smtp-authorization-code}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
mail.from=${MAIL_FROM:your-email@qq.com}

email.verification.code-ttl-seconds=${EMAIL_CODE_TTL:300}
email.verification.resend-cooldown-seconds=${EMAIL_CODE_COOLDOWN:60}
email.verification.max-attempts=${EMAIL_CODE_MAX_ATTEMPTS:5}
email.verification.max-total-attempts=${EMAIL_CODE_MAX_TOTAL_ATTEMPTS:20}
email.verification.send.max-attempts-per-source=${EMAIL_CODE_SEND_MAX_ATTEMPTS_PER_SOURCE:5}
email.verification.send.max-attempts-global=${EMAIL_CODE_SEND_MAX_ATTEMPTS_GLOBAL:100}
email.verification.send.window-seconds=${EMAIL_CODE_SEND_WINDOW_SECONDS:60}

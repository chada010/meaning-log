# 压测 profile —— 仅本地跑 k6 时激活，用于同步 vs MQ 异步 AI 接口的 QPS / 延迟对比。
# Spring 会先加载 application.properties，再用本文件覆盖同名 key。

# ---- 关掉 AI 相关限流（压测同用户 / 同 IP 会瞬间打满）----
ai.rate-limit.max-requests=1000000
ai.rate-limit.window-seconds=60
ai.trial-rate-limit.max-requests=1000000
ai.trial-rate-limit.window-seconds=60

# ---- 关掉 AiTaskReaper（压测中会误把 RUNNING 任务标 TIMEOUT）----
ai.task.reaper.enabled=false

# ---- 关掉 Resilience4j 熔断，防止 Mock Transport 也被误熔（Mock 永远成功，实际不会触发，只是防御）----
resilience4j.circuitbreaker.instances.deepseek.failure-rate-threshold=100

# ---- 压测提示 ----
# 启动方式（PowerShell）：
#   $env:SPRING_PROFILES_ACTIVE="loadtest"; ./mvnw spring-boot:run
# 或（bash）：
#   SPRING_PROFILES_ACTIVE=loadtest ./mvnw spring-boot:run

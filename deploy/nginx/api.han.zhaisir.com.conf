# 宿主机 Nginx 反代 → 后端 8080 (Docker 里 bind 127.0.0.1)
# 装到 /etc/nginx/sites-available/meaning-log-api,
# 然后 ln -s /etc/nginx/sites-available/meaning-log-api /etc/nginx/sites-enabled/
# certbot --nginx -d api.han.zhaisir.com 会自动改写这份配置加 SSL

server {
    listen 80;
    listen [::]:80;
    server_name api.han.zhaisir.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 拿到证书后 certbot 会自动把 / 改成 301 到 https
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.han.zhaisir.com;

    # certbot 会填充下面两行
    # ssl_certificate /etc/letsencrypt/live/api.han.zhaisir.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.han.zhaisir.com/privkey.pem;

    client_max_body_size 20M;  # 日志图片上传

    # SSE 长连接必须关 buffer
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE 关键头
        proxy_set_header Accept $http_accept;
    }
}
